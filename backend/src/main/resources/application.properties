spring.application.name=hotel-management
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=pass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

app.jwt.secret=MyJwtSecretKey1234567890
app.jwt.expiration-ms=86400000
app.admin.email=admin@hotel.com
app.admin.password=admin123
app.admin.name=admin
app.admin.phone=0000000000

spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.main.allow-bean-definition-overriding=true
